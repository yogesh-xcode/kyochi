<div id="erd"></div>
<script type="module">
  import mermaid from "https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs";
  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  await document.fonts.ready;
  mermaid.initialize({
    startOnLoad: false,
    theme: "base",
    fontFamily: '"Anthropic Sans", sans-serif',
    themeVariables: {
      darkMode: dark,
      fontSize: "13px",
      fontFamily: '"Anthropic Sans", sans-serif',
      lineColor: dark ? "#9c9a92" : "#73726c",
      textColor: dark ? "#c2c0b6" : "#3d3d3a",
    },
  });
  const { svg } = await mermaid.render(
    "erd-svg",
    `erDiagram
  FRANCHISES {
    int id PK
    string name
    string city
    string region
    string address
    string phone
    string whatsapp
  }
  PATIENTS {
    int id PK
    int franchise_id FK
    string full_name
    string email
    string phone
    date dob
    float wellness_score
    string status
  }
  THERAPISTS {
    int id PK
    int franchise_id FK
    string full_name
    string email
    string specialty
    string license_no
    string status
  }
  THERAPIES {
    int id PK
    string name
    string category
    int duration_min
    int session_count
    string status
    string description
  }
  APPOINTMENTS {
    int id PK
    int franchise_id FK
    int patient_id FK
    int therapist_id FK
    int therapy_id FK
    datetime starts_at
    string status
  }
  BILLING {
    int id PK
    int appointment_id FK
    int patient_id FK
    float amount
    string currency
    date due_date
    string status
  }
  FEEDBACK {
    int id PK
    int appointment_id FK
    int patient_id FK
    int therapist_id FK
    int invoice_id FK
    string rating
    string notes
  }

  FRANCHISES ||--o{ PATIENTS : "has"
  FRANCHISES ||--o{ THERAPISTS : "employs"
  FRANCHISES ||--o{ APPOINTMENTS : "hosts"
  PATIENTS ||--o{ APPOINTMENTS : "books"
  THERAPISTS ||--o{ APPOINTMENTS : "conducts"
  THERAPIES ||--o{ APPOINTMENTS : "used in"
  APPOINTMENTS ||--o| BILLING : "generates"
  APPOINTMENTS ||--o| FEEDBACK : "receives"
  BILLING ||--o| FEEDBACK : "referenced by"
`,
  );
  document.getElementById("erd").innerHTML = svg;

  document.querySelectorAll("#erd svg .node").forEach((node) => {
    const firstPath = node.querySelector("path[d]");
    if (!firstPath) return;
    const d = firstPath.getAttribute("d");
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs),
      y = Math.min(...ys);
    const w = Math.max(...xs) - x,
      h = Math.max(...ys) - y;
    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute("x", x);
    rect.setAttribute("y", y);
    rect.setAttribute("width", w);
    rect.setAttribute("height", h);
    rect.setAttribute("rx", "8");
    for (const a of ["fill", "stroke", "stroke-width", "class", "style"]) {
      if (firstPath.hasAttribute(a))
        rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });

  document
    .querySelectorAll(
      "#erd svg .row-rect-odd path, #erd svg .row-rect-even path",
    )
    .forEach((p) => {
      p.setAttribute("stroke", "none");
    });
</script>
