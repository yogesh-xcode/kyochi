
<div style="padding: 1.5rem 2rem; background: var(--color-background-tertiary); border-radius: var(--border-radius-lg);">
  <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">

    <div style="
      flex: 1; min-width: 200px;
      display: flex; align-items: center; gap: 8px;
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      padding: 0 12px; height: 36px;
    ">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b8960c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span style="font-size: 13px; color: var(--color-text-secondary);">Search appointments...</span>
    </div>

    <div style="display: flex; align-items: center; gap: 6px; margin-left: 4px;">

      <button style="
        display: flex; align-items: center; gap: 6px;
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 0 12px; height: 36px;
        font-size: 13px; color: var(--color-text-primary); cursor: pointer;
      ">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/>
        </svg>
        Filters
      </button>

      <button style="
        display: flex; align-items: center; gap: 6px;
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 0 12px; height: 36px;
        font-size: 13px; color: var(--color-text-primary); cursor: pointer;
      ">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload
      </button>

      <div style="width: 0.5px; height: 20px; background: var(--color-border-secondary); margin: 0 2px;"></div>

      <button style="
        display: flex; align-items: center; gap: 6px;
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 0 12px; height: 36px;
        font-size: 13px; color: var(--color-text-secondary); cursor: pointer;
      ">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>

      <button style="
        display: flex; align-items: center; gap: 6px;
        background: var(--color-background-primary);
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        padding: 0 12px; height: 36px;
        font-size: 13px; color: var(--color-text-secondary); cursor: pointer;
      ">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
        </svg>
        Print
      </button>

      <button style="
        display: flex; align-items: center; gap: 6px;
        background: #b8960c;
        border: none;
        border-radius: var(--border-radius-md);
        padding: 0 14px; height: 36px;
        font-size: 13px; color: #fff; font-weight: 500; cursor: pointer;
      ">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add
      </button>

    </div>
  </div>
</div>
